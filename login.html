<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - VM-tipset</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main style="max-width: 400px; margin: 100px auto; background: white; padding: 2rem; border-radius: 12px;">

        <h2>Logga in</h2>

        <input id="email" type="email" placeholder="Email" style="margin-top: 1rem; padding: 0.5rem; width: 100%;">

        <input id="password" type="password" placeholder="Lösenord"
            style="margin-top: 1rem; padding: 0.5rem; width: 100%;">

        <button id="login-btn" style="margin-top: 1rem; width: 100%; padding: 0.75rem;">
            Logga in
        </button>

        <p id="error" style="color: red; margin-top: 1rem;"></p>

    </main>

    <script type="module" src="js/login.js"></script>

</body>

</html>
